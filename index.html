<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Dynamically set theme-color based on user/app preference -->
    <meta name="theme-color" content="#F9FAFB" id="dynamic-theme-color" />
    <script>
      (function() {
        // Centralised theme helper — sets CSS vars, meta tag, and dark class
        window.__applyTheme = function(t) {
          var d = document.documentElement;
          var isDark = t === 'dark';
          d.classList.toggle('dark', isDark);

          // CSS custom properties consumed by splash & rest of app
          var bg    = isDark ? '#111827' : '#F9FAFB';
          var txt   = isDark ? '#F3F4F6' : '#111827';
          var sub   = isDark ? '#9CA3AF' : '#6B7280';
          var ring  = isDark ? '#374151' : '#E5E7EB';
          var accent= isDark ? '#818CF8' : '#6366F1';
          d.style.setProperty('--splash-bg', bg);
          d.style.setProperty('--splash-text', txt);
          d.style.setProperty('--splash-sub', sub);
          d.style.setProperty('--splash-ring', ring);
          d.style.setProperty('--splash-accent', accent);

          // Status-bar / address-bar colour
          var meta = document.getElementById('dynamic-theme-color');
          if (meta) meta.setAttribute('content', bg);
        };
        try {
          var KEY = 'canteen_theme';
          var saved = localStorage.getItem(KEY);
          var theme = (saved === 'dark' || saved === 'light') ? saved
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          window.__applyTheme(theme);

          // React to OS-level theme change when no explicit preference is saved
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (!localStorage.getItem(KEY)) {
              window.__applyTheme(e.matches ? 'dark' : 'light');
            }
          });
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="Order food for your kids from school canteen" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>School Canteen</title>
    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--splash-bg, #F9FAFB);
        transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
      }
      #splash-screen.hide {
        opacity: 0;
        visibility: hidden;
      }
      #splash-screen .splash-icon {
        width: 96px;
        height: 96px;
        border-radius: 24px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        animation: splash-bounce 1.2s ease-in-out infinite;
      }
      #splash-screen .splash-title {
        margin-top: 24px;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 24px;
        font-weight: 700;
        color: var(--splash-text, #111827);
        letter-spacing: -0.025em;
      }
      #splash-screen .splash-subtitle {
        margin-top: 8px;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 14px;
        color: var(--splash-sub, #6B7280);
      }
      #splash-screen .splash-loader {
        margin-top: 32px;
        width: 32px;
        height: 32px;
        border: 3px solid var(--splash-ring, #E5E7EB);
        border-top-color: var(--splash-accent, #6366F1);
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <img src="/icons/icon-192.png" alt="" class="splash-icon" />
      <div class="splash-title">LOHECA Canteen</div>
      <div class="splash-subtitle">Order food for your kids</div>
      <div class="splash-loader"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
